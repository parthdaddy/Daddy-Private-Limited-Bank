<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daddy Private Limited Bank</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f4f8;
margin:0;
padding:0;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
width:350px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#0073e6;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0059b3;
}

footer{
text-align:center;
margin-top:40px;
color:#666;
}

</style>
</head>


<body>

<header>
<h1>Daddy Private Limited Bank</h1>
<p>Secure Online Banking</p>
</header>


<div class="container">

<h2>Customer Login</h2>

<form onsubmit="login(event)">

<input type="text" id="userid" placeholder="Customer ID" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p id="message" style="color:red;text-align:center;"></p>

</div>


<footer>
<p>© 2026 Daddy Private Limited Bank</p>
</footer>


<script>

function login(event){

event.preventDefault()

let id=document.getElementById("userid").value
let pass=document.getElementById("password").value

if(id==="customer1" && pass==="12345"){
window.location.href="dashboard.html"
}
else{
document.getElementById("message").innerText="Invalid ID or Password"
}

}

</script>


</body>
</html>
