<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daddy Private Limited Bank</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
background:#0d0d0d;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1a1a1a;
padding:40px;
border-radius:10px;
width:340px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
background:#00c3ff;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>Daddy Private Limited Bank</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<div id="g_id_onload"
data-client_id="YOUR_GOOGLE_CLIENT_ID"
data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
data-type="standard">
</div>

<p id="msg"></p>

</div>

<script>

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

if(email==="customer@gmail.com" && pass==="12345"){
window.location="dashboard.html"
}else{
document.getElementById("msg").innerText="Invalid login"
}

}

function handleCredentialResponse(response){

console.log("Google login success")

window.location="dashboard.html"

}

</script>

</body>

</html>
