<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daddy Private Limited Bank</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0d0d0d;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1a1a1a;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 0 20px rgba(0,0,0,0.8);
text-align:center;
}

h1{
margin-bottom:10px;
color:#00c3ff;
}

p{
margin-bottom:25px;
color:#aaa;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#2a2a2a;
color:white;
}

input:focus{
outline:none;
border:1px solid #00c3ff;
}

button{
width:100%;
padding:12px;
background:#00c3ff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
color:black;
font-weight:bold;
margin-top:10px;
}

button:hover{
background:#00a5d6;
}

.footer{
margin-top:20px;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>Daddy Private Bank</h1>
<p>Secure Customer Login</p>

<input id="user" placeholder="Customer ID">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

<div class="footer">
© 2026 Daddy Private Limited Bank
</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="customer1" && p==="12345"){
window.location="dashboard.html"
}
else{
document.getElementById("msg").innerText="Invalid login credentials"
}

}

</script>

</body>
</html>
